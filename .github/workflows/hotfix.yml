name: Hotfix Deploy

# Dispara em qualquer push para branches hotfix/*
# Objetivo: commit → produção em < 5 minutos
# Diferenças do deploy normal:
#   - Roda SOMENTE lint + testes unitários + integração crítica (sem E2E)
#   - Build e deploy imediatos após os testes passarem
#   - Notificação Slack ao final

on:
  push:
    branches:
      - "hotfix/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false  # nunca cancelar deploy em andamento

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. LINT + TESTES CRÍTICOS (sem E2E)
  # ────────────────────────────────────────────────────────────────
  test:
    name: Lint + Testes Criticos
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt ruff black

      # ── Lint Python ─────────────────────────────────────────────
      - name: ruff check
        working-directory: backend
        run: ruff check .

      - name: black check
        working-directory: backend
        run: black --check .

      # ── Node setup ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      # ── Testes unitários + integração crítica (sem E2E) ─────────
      - name: pytest unitarios e integracao critica
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: hotfix-ci-secret-not-for-production
          ENVIRONMENT: test
          ANTHROPIC_API_KEY: sk-ant-fake
          OPENAI_API_KEY: sk-fake
          APIFY_TOKEN: fake
          YOUTUBE_API_KEY: fake
          RESEND_API_KEY: fake
          GOOGLE_SERVICE_ACCOUNT_JSON: /dev/null
          GOOGLE_DRIVE_FOLDER_ID: fake
        run: |
          pytest \
            tests/unit/ \
            tests/integration/test_api_endpoints.py \
            -v --tb=short -x \
            --no-header \
            -q

  # ────────────────────────────────────────────────────────────────
  # 2. BUILD, PUSH E DEPLOY
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy Hotfix
    runs-on: ubuntu-latest
    needs: [test]
    environment:
      name: production
      url: https://app.logia.com.br

    steps:
      - uses: actions/checkout@v4

      # ── Docker ──────────────────────────────────────────────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:hotfix-latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build e push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:hotfix-latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            VITE_API_URL=https://app.logia.com.br
            VITE_WS_URL=wss://app.logia.com.br
            VITE_BUILD_SHA=${{ github.sha }}
            VITE_ENVIRONMENT=production
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}

      # ── Deploy via SSH ───────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ github.sha }}
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,GHCR_IMAGE,GH_ACTOR,GH_TOKEN
          script: |
            set -euo pipefail
            cd /opt/logia/app

            echo "==> Atualizando docker-compose e scripts da main..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Login no GHCR..."
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            echo "==> Exportando variaveis para compose..."
            export IMAGE_TAG="${IMAGE_TAG}"
            export GHCR_IMAGE="${GHCR_IMAGE}"

            echo "==> Pull imagem hotfix ${IMAGE_TAG}..."
            docker compose -f docker-compose.prod.yml pull backend frontend

            echo "==> Subindo servicos com imagem hotfix..."
            docker compose -f docker-compose.prod.yml up -d \
              --no-build \
              --no-deps \
              backend worker beat frontend

            echo "==> Executando migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend \
              alembic upgrade head

            echo "==> Gravando timestamp de deploy..."
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) [HOTFIX]" | \
              docker compose -f docker-compose.prod.yml exec -T backend \
              tee /app/.deploy_ts > /dev/null

            echo "==> Limpando imagens antigas..."
            docker image prune -f

            echo "==> Hotfix deploy OK: ${IMAGE_TAG}"

      # ── Health check (3x com retry) ──────────────────────────────
      - name: Health check
        run: |
          echo "Aguardando estabilizacao (10s)..."
          sleep 10
          for i in 1 2 3; do
            STATUS=$(curl -sf https://app.logia.com.br/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','err'))" \
              2>/dev/null || echo "err")
            echo "Health check $i/3: status=${STATUS}"
            [ "${STATUS}" = "healthy" ] && echo "Hotfix verificado com sucesso" && exit 0
            [ "$i" -lt 3 ] && sleep 15
          done
          echo "ERRO: health check falhou apos 3 tentativas"
          exit 1

      # ── Notificacao de sucesso ────────────────────────────────────
      - name: Notificar Slack - sucesso
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "${SLACK_WEBHOOK}" ] && echo "SLACK_WEBHOOK nao configurado, pulando notificacao" && exit 0
          SHORT_SHA="${SHA:0:7}"
          curl -s -X POST "${SLACK_WEBHOOK}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"🚑 *Hotfix deployed!*\nBranch: \`${BRANCH}\`\nCommit: \`${SHORT_SHA}\`\nProdução: https://app.logia.com.br\nRun: ${RUN_URL}\"}"

      # ── Notificacao de falha ──────────────────────────────────────
      - name: Notificar falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const branch = context.ref.replace('refs/heads/', '');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[HOTFIX FALHOU] ${branch} (${sha}) - ${new Date().toISOString().slice(0,16)}`,
              body: [
                "## Hotfix falhou em producao",
                "",
                `**Branch:** \`${branch}\``,
                `**Commit:** \`${sha}\``,
                `**Run:** ${runUrl}`,
                "",
                "### Proximos passos",
                "1. Verificar logs no link acima",
                "2. Se necessario, executar rollback via workflow_dispatch em rollback.yml",
                "3. Fechar esta issue apos resolver",
              ].join("\n"),
              labels: ["bug", "deploy", "hotfix"],
            });
