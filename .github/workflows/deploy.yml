name: Deploy

on:
  # Dispara somente apos CI verde na main
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # nunca cancelar deploy em andamento

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: production
      url: https://app.logia.com.br

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # --------------------------------------------------------
      # 1. BUILD E PUSH DAS IMAGENS PARA GHCR
      # --------------------------------------------------------
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build e push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            VITE_API_URL=https://app.logia.com.br
            VITE_WS_URL=wss://app.logia.com.br
            VITE_BUILD_SHA=${{ github.event.workflow_run.head_sha }}
            VITE_ENVIRONMENT=production
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}

      # --------------------------------------------------------
      # 2. DEPLOY NO VPS VIA SSH
      # --------------------------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,GHCR_IMAGE,GH_ACTOR,GH_TOKEN
          script: |
            set -euo pipefail
            cd /opt/logia/app

            echo "==> Atualizando codigo..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Login no GHCR..."
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            echo "==> Exportando variaveis para compose..."
            export IMAGE_TAG="${IMAGE_TAG}"
            export BACKEND_IMAGE="${GHCR_IMAGE}/backend"
            export FRONTEND_IMAGE="${GHCR_IMAGE}/frontend"

            echo "==> Pull imagens ${IMAGE_TAG}..."
            docker compose -f docker-compose.prod.yml pull backend frontend

            echo "==> Subindo servicos..."
            docker compose -f docker-compose.prod.yml up -d               --no-build               --remove-orphans               --wait               --wait-timeout 120

            echo "==> Executando migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend               alembic upgrade head

            echo "==> Gravando timestamp de deploy..."
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" | \
              docker compose -f docker-compose.prod.yml exec -T backend \
              tee /app/.deploy_ts > /dev/null

            echo "==> Limpando imagens antigas..."
            docker image prune -f

            echo "==> Deploy OK: ${IMAGE_TAG}"

      # --------------------------------------------------------
      # 3. HEALTH CHECK POS-DEPLOY
      # --------------------------------------------------------
      - name: Health check
        run: |
          echo "Aguardando estabilizacao (15s)..."
          sleep 15
          for i in 1 2 3; do
            STATUS=$(curl -sf https://app.logia.com.br/health               | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','err'))")
            echo "Health check $i/3: status=${STATUS}"
            [ "${STATUS}" = "healthy" ] && echo "Deploy verificado" && exit 0
            sleep 10
          done
          echo "ERRO: health check falhou"
          exit 1

      # --------------------------------------------------------
      # 4. NOTIFICACAO EM CASO DE FALHA (abre issue no GitHub)
      # --------------------------------------------------------
      - name: Notificar falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DEPLOY FALHOU] ${sha} - ${new Date().toISOString().slice(0,16)}`,
              body: [
                "## Deploy falhou em producao",
                "",
                `**Commit:** \`${sha}\``,
                `**Run:** ${runUrl}`,
                "",
                "### Proximos passos",
                "1. Verificar logs no link acima",
                "2. Executar rollback via workflow_dispatch em rollback.yml se necessario",
                "3. Fechar esta issue apos resolver",
              ].join("\n"),
              labels: ["bug", "deploy"],
            });
