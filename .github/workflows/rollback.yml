name: Rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "SHA ou tag da imagem (ex: abc1234 ou latest)"
        required: true
        type: string
      reason:
        description: "Motivo do rollback (para auditoria)"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false   # nunca interromper deploy em andamento

jobs:
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.logia.com.br

    steps:
      - uses: actions/checkout@v4

      # --------------------------------------------------------
      # 1. VERIFICAR SE A IMAGEM EXISTE NO GHCR
      # --------------------------------------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verificar existencia da imagem
        run: |
          TAG="${{ inputs.image_tag }}"
          REPO="ghcr.io/${{ github.repository }}"
          docker manifest inspect "${REPO}/backend:${TAG}"             || (echo "ERRO: backend:${TAG} nao encontrado" && exit 1)
          docker manifest inspect "${REPO}/frontend:${TAG}"             || (echo "ERRO: frontend:${TAG} nao encontrado" && exit 1)
          echo "Imagens verificadas: ${REPO}/*:${TAG}"

      # --------------------------------------------------------
      # 2. EXECUTAR ROLLBACK NO VPS
      # --------------------------------------------------------
      - name: Executar rollback via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROLLBACK_REASON: ${{ inputs.reason }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,GHCR_IMAGE,GH_ACTOR,GH_TOKEN,ROLLBACK_REASON
          script: |
            set -euo pipefail
            cd /opt/logia/app

            echo "==> ROLLBACK INICIADO"
            echo "    Tag:    ${IMAGE_TAG}"
            echo "    Motivo: ${ROLLBACK_REASON}"

            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            export IMAGE_TAG="${IMAGE_TAG}"
            export GHCR_IMAGE="${GHCR_IMAGE}"

            echo "==> Pulling imagens de rollback..."
            docker compose -f docker-compose.prod.yml pull backend frontend

            echo "==> Aplicando rollback..."
            docker compose -f docker-compose.prod.yml up -d               --no-build               --remove-orphans               --wait               --wait-timeout 120

            # ATENCAO: rollback NAO executa alembic downgrade automaticamente.
            # Se a migration precisar ser revertida, executar manualmente:
            #   docker compose -f docker-compose.prod.yml exec backend alembic downgrade -1

            docker image prune -f
            echo "==> ROLLBACK CONCLUIDO: ${IMAGE_TAG}"

      # --------------------------------------------------------
      # 3. HEALTH CHECK POS-ROLLBACK
      # --------------------------------------------------------
      - name: Health check
        run: |
          sleep 15
          for i in 1 2 3; do
            STATUS=$(curl -sf https://app.logia.com.br/health               | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','err'))")
            echo "Health check $i/3: status=${STATUS}"
            [ "${STATUS}" = "ok" ] && echo "Rollback verificado" && exit 0
            sleep 10
          done
          echo "ERRO: health check falhou apos rollback"
          exit 1

      # --------------------------------------------------------
      # 4. REGISTRAR ROLLBACK (AUDITORIA)
      # --------------------------------------------------------
      - name: Registrar rollback como issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = "${{ job.status }}" === "success";
            const tag = "${{ inputs.image_tag }}";
            const reason = "${{ inputs.reason }}";
            const actor = context.actor;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = ok
              ? `[ROLLBACK OK] tag=${tag} - ${new Date().toISOString().slice(0,16)}`
              : `[ROLLBACK FALHOU] tag=${tag} - ${new Date().toISOString().slice(0,16)}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                `## Rollback ${ok ? "executado com sucesso" : "FALHOU"}`,
                "",
                `**Tag:** \`${tag}\``,
                `**Motivo:** ${reason}`,
                `**Por:** @${actor}`,
                `**Run:** ${runUrl}`,
                `**Status:** ${ok ? "Sucesso" : "FALHA - verificar logs"}`,
              ].join("\n"),
              labels: ok ? ["rollback"] : ["rollback", "bug"],
            });
