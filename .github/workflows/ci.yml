name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff black
      - name: ruff check
        working-directory: backend
        run: ruff check .
      - name: black check
        working-directory: backend
        run: black --check .
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: ESLint
        working-directory: frontend
        run: npm run lint

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
        working-directory: backend
      - name: pytest with coverage
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-not-for-production
          ENVIRONMENT: test
          ANTHROPIC_API_KEY: sk-ant-fake
          OPENAI_API_KEY: sk-fake
          APIFY_TOKEN: fake
          YOUTUBE_API_KEY: fake
          RESEND_API_KEY: fake
          GOOGLE_SERVICE_ACCOUNT_JSON: /dev/null
          GOOGLE_DRIVE_FOLDER_ID: fake
        run: |
          pytest             --cov=app             --cov-report=xml             --cov-report=term-missing             --cov-fail-under=70             -v --tb=short
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  test-frontend:
    name: Test Frontend (Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://app.logia.com.br
          VITE_WS_URL: wss://app.logia.com.br
        run: npm run build
      - name: Check bundle size (max 250 KB gzipped)
        working-directory: frontend
        run: |
          GZIP_KB=$(find dist/assets \( -name "*.js" -o -name "*.css" \)             | xargs gzip -c | wc -c | awk '{printf "%.0f", $1/1024}')
          echo "Bundle gzipped: ${GZIP_KB} KB"
          [ "$GZIP_KB" -gt 250 ]             && echo "ERRO: bundle > 250 KB (${GZIP_KB} KB)" && exit 1
          echo "OK: ${GZIP_KB} KB / 250 KB"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      postgres:
        image: postgres:15-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_DB: logia_test
          POSTGRES_USER: logia
          POSTGRES_PASSWORD: logia_ci
        options: >-
          --health-cmd "pg_isready -U logia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
        working-directory: backend
      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://logia:logia_ci@localhost:5432/logia_test
        run: alembic upgrade head
      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://logia:logia_ci@localhost:5432/logia_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-e2e-secret-not-for-production
          ENVIRONMENT: test
          ANTHROPIC_API_KEY: sk-ant-fake
          OPENAI_API_KEY: sk-fake
          APIFY_TOKEN: fake
          YOUTUBE_API_KEY: fake
          RESEND_API_KEY: fake
          GOOGLE_SERVICE_ACCOUNT_JSON: /dev/null
          GOOGLE_DRIVE_FOLDER_ID: fake
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo "Backend OK" && break
            echo "Aguardando... ($i/30)" && sleep 2
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium webkit
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: Serve frontend
        working-directory: frontend
        run: npx vite preview --port 3000 &
      - name: Run Playwright tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:3000
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - name: bandit (HIGH+CRITICAL)
        working-directory: backend
        run: bandit -r app -c pyproject.toml -ll --exit-zero
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: npm audit (HIGH+CRITICAL, prod only)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev
