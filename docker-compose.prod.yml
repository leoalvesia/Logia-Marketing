version: "3.9"

# ── Networks isoladas ─────────────────────────────────────────────────────────
# frontend_net : frontend (nginx) ↔ backend
# backend_net  : backend ↔ worker ↔ beat ↔ redis ↔ postgres
# postgres e redis NÃO têm portas expostas ao host

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

# ── Volumes persistentes ──────────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:

# ── Serviços ──────────────────────────────────────────────────────────────────
services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-logia-backend}:${IMAGE_TAG:-latest}
    restart: always
    env_file: /opt/logia/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  # ── Celery Worker (agentes IA — pesado) ─────────────────────────────────────
  worker:
    image: ${BACKEND_IMAGE:-logia-backend}:${IMAGE_TAG:-latest}
    restart: always
    env_file: /opt/logia/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend_net
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=copy,art,research
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────────
  beat:
    image: ${BACKEND_IMAGE:-logia-backend}:${IMAGE_TAG:-latest}
    restart: always
    env_file: /opt/logia/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend_net
    command: celery -A app.celery_app beat --loglevel=info
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ── Frontend (Nginx + Vite build) ────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-logia-frontend}:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    # SEM porta exposta ao host — acesso apenas interno via backend_net
    networks:
      - backend_net
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: always
    # SEM porta exposta ao host — acesso apenas interno via backend_net
    networks:
      - backend_net
    env_file: .env.prod
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-logia}
      POSTGRES_USER:     ${POSTGRES_USER:-logia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
