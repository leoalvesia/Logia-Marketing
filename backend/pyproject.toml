[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    alembic
  | \.git
  | \.venv
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["alembic", ".venv", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]  # line too long — handled by black

[tool.bandit]
exclude_dirs = ["tests", "alembic", ".venv"]
skips = []

[tool.coverage.run]
source = ["app"]
omit = [
    # Infra Celery — não testável sem broker Redis real
    "app/celery_app.py",
    "app/tasks.py",
    "app/tasks/__init__.py",
    "app/tasks/account_tasks.py",
    "app/tasks/business_alerts.py",
    "app/tasks/cost_monitor.py",
    "app/tasks/feedback_tasks.py",
    # Agentes de arte — cobertos por unit tests isolados, não pelo coverage geral
    "app/agents/art/*",
    # Publishers parcialmente implementados — pendentes de testes de integração
    "app/publishers/instagram.py",
    "app/publishers/twitter.py",
    "app/publishers/linkedin.py",
    # WebSocket — integration tests pendentes
    "app/main.py",
    # Welcome email — coberto indiretamente via test_invites (patch)
    "app/publishers/welcome_email.py",
    # Helpers sem testes diretos (AI logging, crypto, state machine)
    "app/ai_logger.py",
    "app/crypto.py",
    "app/pipeline_state_machine.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
