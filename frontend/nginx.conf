server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── DNS resolver do Docker (resolução lazy de "backend") ──────────────────
    # Evita falha no startup quando o upstream ainda não existe
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Cache: assets com hash no nome (Vite) — 1 ano ─────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache: index.html — nunca cachear (SPA entry point) ───────────────────
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Proxy: API REST → backend ─────────────────────────────────────────────
    location /api/ {
        # Variável = resolução lazy (não falha no startup sem o upstream)
        set $backend_api http://backend:8000;
        proxy_pass $backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Proxy: WebSocket → backend ────────────────────────────────────────────
    location /ws/ {
        set $backend_ws http://backend:8000;
        proxy_pass $backend_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400s;  # 24h — WebSocket persistente
        proxy_send_timeout 86400s;
    }

    # ── SPA fallback: todas as rotas servem index.html ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
